name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build and test
        run: ./mvnw --batch-mode clean verify

  integration:
    runs-on: ubuntu-latest
    needs: build
    # Non-required status check — do not block PR merge.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Integration tests (MySQL + PostgreSQL)
        run: ./mvnw --batch-mode -Pintegration test
